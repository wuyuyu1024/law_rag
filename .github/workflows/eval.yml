name: Eval Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit and integration tests
        run: uv run python -m pytest -q

      - name: Run lint
        run: uv run ruff check .

      - name: Run typed-surface check
        run: uv run mypy

      - name: Run local promotion gate
        run: uv run python scripts/run_eval.py --candidate-label ci --gate-promotion
